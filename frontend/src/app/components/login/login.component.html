<div class="login-container">
  <mat-card class="login-card mat-elevation-z8">
    <div class="login-header">
      <mat-icon class="login-logo">local_library</mat-icon>
      <h2>LibManage Pro</h2>
      <p>Library Management System Portal</p>
    </div>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" placeholder="Enter your username" autocomplete="username">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="f['username'].errors?.['required']">Username is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter your password" autocomplete="current-password">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="f['password'].errors?.['required']">Password is required</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width login-button" type="submit" [disabled]="loading">
          <span *ngIf="!loading">LOG IN</span>
          <mat-spinner *ngIf="loading" diameter="24" class="login-spinner"></mat-spinner>
        </button>
      </form>

      <!-- Toggle page link -->
      <div class="login-link" style="text-align: center; margin-top: 20px; font-size: 14px; color: #7f8c8d;">
        Don't have an account? <a routerLink="/register" style="color: #3f51b5; text-decoration: none; font-weight: 600;">Register here</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
