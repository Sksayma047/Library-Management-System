<div class="denied-container">
  <mat-card class="denied-card mat-elevation-z8">
    <mat-icon class="denied-icon">gpp_bad</mat-icon>
    <h1>Access Denied</h1>
    <p>You do not have the required permissions to access this page. If you believe this is an error, please contact your administrator.</p>
    <button mat-raised-button color="primary" class="actions-btn" [routerLink]="getRedirectUrl()">
      Go to Home Page
    </button>
  </mat-card>
</div>
